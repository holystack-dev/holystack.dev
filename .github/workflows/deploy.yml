name: Deploy to Cloudflare Pages

# Builds the Astro site and deploys dist/ to Cloudflare Pages on every push to main.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  your Cloudflare account ID
#
# Deploys to the existing Cloudflare Pages project named in PROJECT_NAME below.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: holystack

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ env.PROJECT_NAME }} --branch=main
